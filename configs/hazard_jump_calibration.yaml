# Hazard jump-channel calibration (OQ-INT-07 / OQ-HAZ-12; DC-XWALK-4).
#
# Drives pipelines/03_hazard_jump_calibration.py: per event-set variant, fit the
# Poisson arrival intensity (MLE + exact CI + log-linear trend) and the lognormal
# per-event loss severity from the consolidated CENAPRED climate-event table.
# The variants are the "which events trigger a jump" knob, compared side by side
# in results/hazard_jump_calibration/parameters.csv.
#
# Losses are deflated at load time to the latest year of the `deflator` index
# (2025 pesos; GEN-13, OQ-INT-07b): sev_median_mdp is real and the damage
# thresholds mean constant pesos — a nominal threshold is a falling real bar
# (-40 % over 2002-2015), which fabricates arrivals growth. Set `deflator: null`
# to reproduce the nominal INT-16 fits.

events_csv: data/hazard_mx/datos_CENAPRED/consolidados/eventos_cenapred_climada.csv
deflator: configs/inpc_anual.yaml

window:
  start: 2002 # 2000-01 excluded — reporting ramp-in (32 / 11 events vs ~150-240 after)
  end: 2015 # extent of the event-level base (DC-HAZ-CENAPRED-1)

alpha: 0.05 # 1 - confidence level of the intensity interval

variants:
  todos: {} # every discrete climate-scope event
  mayores_200mdp: # "major" events: damage >= 200 M 2025-MXN (~ p86 of positive real
    # losses; rarity-matched to the superseded nominal >= 100 set: n 270 vs 274)
    min_damage_mdp: 200.0
  ciclon_tropical: # the CLIMADA calibration peril (HAZ-CLIMADA-02)
    perils: ["Ciclón tropical"]
  hidrometeorologico: # the wet perils as one family
    perils:
      ["Ciclón tropical", "Daños por lluvia", "Inundación", "Tormenta severa", "Marejada"]
