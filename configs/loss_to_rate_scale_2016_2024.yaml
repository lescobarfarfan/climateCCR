# Loss->rate event study, 2016-2024 SUBSAMPLE — regime diagnostic, NOT the gate.
#
# Companion to configs/loss_to_rate_scale_2000_2024.yaml (the binding
# re-application of the pre-registered INT-18 gate to the full extended
# window). This run isolates the report-regime episodes — the window holding
# Otis 2023, John 2024, Agatha 2022, Grace 2021, the 2020 Tabasco floods —
# to answer one question: does a per-event Mexican rate response appear once
# the strongest modern candidates are in sample by themselves? Its gate
# evaluation is reported for symmetry but is DIAGNOSTIC ONLY: the adopted
# rate-marks scale comes from the 2000_2024 run (OQ-HAZ-18).
# Differs from loss_to_rate_scale_2000_2024.yaml only in event_set.start and
# output_dir.

seed: 233423

events_csv: data/hazard_mx/datos_CENAPRED/consolidados_2000_2024/eventos_cenapred_climada.csv
deflator: configs/inpc_anual.yaml
sie_dir: data/market_mx/sie
fred_dir: data/market_mx/fred
output_dir: loss_to_rate_scale_2016_2024

event_set:
  start: 2016
  end: 2024
  min_damage_mdp: 200.0

episode:
  max_duration_days: 30
  merge_window_bd: 5

study:
  estimation_window_bd: [-120, -10]
  min_estimation_obs: 60
  event_windows_bd: [1, 5, 10]
  max_missing_frac: 0.4
  n_bootstrap: 10000

pillars:
  TIIE28: { grupo: tiies, columna: TIIE28, control: DGS3MO, t_dias: 28 }
  CETES364: { grupo: cetes364, columna: TasaRendimiento, control: DGS3MO, t_dias: 364 }
  BonosM_0_3: { grupo: bonos_m, control: DGS2 }
  BonosM_3_5: { grupo: bonos_m, control: DGS2 }
  BonosM_5_7: { grupo: bonos_m, control: DGS5 }
  BonosM_7_10: { grupo: bonos_m, control: DGS10 }
  BonosM_10_20: { grupo: bonos_m, control: DGS10 }
  BonosM_20_30: { grupo: bonos_m, control: DGS30 }

lead:
  pillar_order: [BonosM_20_30, BonosM_10_20, BonosM_7_10]
  window_bd: 5
  min_episodes: 30
  p_threshold: 0.05

hw1f_alpha: 0.05

robustness:
  gfc_exclusion: ["2008-09-01", "2009-06-30"] # no-op in this window; kept verbatim
  min_damage_alt: 1000.0

fallback:
  beta_per_bn_mdp: 4.0e-6
  t_years: 10.0
  source: "Anyfantaki2025 (ECB WP 3135) fig. 8 + INEGI Q4-2025 GDP bridge"
